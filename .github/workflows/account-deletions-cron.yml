name: Account Deletions Cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  trigger-account-deletions:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger account deletion processor
        env:
          CRON_BASE_URL: ${{ secrets.CRON_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -eu

          if [ -z "$CRON_BASE_URL" ]; then
            echo "CRON_BASE_URL GitHub secret is required"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET GitHub secret is required"
            exit 1
          fi

          RESPONSE_FILE="$(mktemp)"
          HTTP_STATUS="$(curl --silent --show-error \
            --output "$RESPONSE_FILE" \
            --write-out "%{http_code}" \
            --request POST \
            --header "x-cron-secret: $CRON_SECRET" \
            --header "Content-Type: application/json" \
            "$CRON_BASE_URL/api/cron/account-deletions")"

          echo "Cron endpoint: $CRON_BASE_URL/api/cron/account-deletions"
          echo "HTTP status: $HTTP_STATUS"
          echo "Response body:"
          cat "$RESPONSE_FILE"
          echo

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Account deletions cron request failed"
            exit 1
          fi
